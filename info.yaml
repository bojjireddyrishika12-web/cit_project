project:
  title:        "PQC Key Encapsulation"
  author:       "Aishwarya and Rishika"
  description:  "Linear Feedback Shift Register for pseudo-random number and key generation in PQC structures."
  language:     "Verilog"
  clock_hz:     10000000
  tiles:        "1x1"
  top_module:   "tt_um_pqc_rishi"
  source_files:
    - "project.v"

pinout:
  ui[0]: "seed_in_0"
  ui[1]: "seed_in_1"
  ui[2]: "seed_in_2"
  ui[3]: "seed_in_3"
  ui[4]: "seed_in_4"
  ui[5]: "seed_in_5"
  ui[6]: "seed_in_6"
  ui[7]: "seed_in_7"
  uo[0]: "out_0"
  uo[1]: "out_1"
  uo[2]: "out_2"
  uo[3]: "out_3"
  uo[4]: "out_4"
  uo[5]: "out_5"
  uo[6]: "out_6"
  uo[7]: "out_7"
  uio[0]: "mode_sel"
  uio[1]: "unused_1"
  uio[2]: "unused_2"
  uio[3]: "unused_3"
  uio[4]: "unused_4"
  uio[5]: "unused_5"
  uio[6]: "unused_6"
  uio[7]: "unused_7"

how_it_works: "Implements an 8-bit maximal-period LFSR primitive for cryptographic noise masking and key generation routines."
how_to_test:  "Assert rst_n low to load seed state. Toggle mode_sel high to inject external ui input bits into the generator register loop."

yaml_version: 6
